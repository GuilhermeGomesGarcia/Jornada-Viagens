<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jornada Viagens, uma agência apaixonada por criar viagens inesquecíveis" />

    <meta name="og:title" content="Jornada Viagens" />
    <meta name="og:description" content="Jornada Viagens, uma agência apaixonada por criar viagens inesquecíveis" />
    <meta name="og:image" content="https://guilhermegomesgarcia.github.io/Jornada-Viagens/img/Logo-branco-rodape.png" />
    <meta name="og:type" content="website" />
    <meta name="og:url" content="https://guilhermegomesgarcia.github.io/Jornada-Viagens" />

    <link rel="icon" href="fav-icon.svg" type="xml/svg" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Jornada Viagens</title>
</head>

<body class="contato">
    <header class="cabecalho">
        <a href="index.html" title="Voltar para a página inicial" class="cabecalho__logo">
            <img src="./img/Logo-mobile-branca.png" class="logo__mobile" alt="Logo da Jornada Viagens na cor branca" />

            <img src="./img/logo-desktop-branca.png" class="logo__desktop"
                alt="Bússola do logo da Jornada Viagens na cor branca" />
        </a>

        <div class="cabecalho__menu-hamburguer">
            <label for="cabecalho__menu-hamburguer-checkbox" class="cabecalho__menu-hamburguer__label">
                <img src="./img/menu.png" alt="menu hamburguer" />
            </label>
            <input type="checkbox" id="cabecalho__menu-hamburguer-checkbox" hidden />
            <nav class="cabecalho__menu-hamburguer__nav">
                <ul class="cabecalho__menu-hamburguer__lista">
                    <li>
                        <a href="blog.html" target="_self" title="Acessar página do blog">Blog</a>
                    </li>
                    <li>
                        <a href="pacotes.html" target="_self" title="Acessar página de pacotes de viagem">Pacotes de
                            viagem</a>
                    </li>
                    <li>
                        <a href="contato.html" target="_self" title="Acessar página de contato">Contato</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero contato__hero" role="banner">
        <div class="contato__hero-descricao">
            <div class="secao__titulo">
                <h2>Entre em contato!</h2>
                <hr />
            </div>
            <h3 class="descricao__texto">Dúvidas, sugestões, problemas para resolver? Temos uma equipe de plantão para
                ajudar você!</h3>
        </div>
    </section>

    <footer class="rodape">
        <div class="rodape__conteudo__descricao">
            <img class="rodape__conteudo__descricao-logo" src="./img/Logo-branco-rodape.png" alt="Logo Jornada Viagens">
            <p class="descricao__texto">Horário de atendimento: 08h - 20h (Segunda a Sábado)</p>
            <p class="descricao__texto">Desenvolvido por Alura. Projeto fictício sem fins comerciais.</p>
        </div>

        <div class="rodape__conteudo__redes">
            <p class="descricao__texto">Acesse nossas redes:</p>
            <a href="#" target="_blank" title="Entre em contato via whatsapp"><img class="whatsapp"
                    src="./img/icone-whatsapp.png" alt="Icone do whatsapp na cor branca"></a>
            <a href="#" target="_blank" title="Acesse o Instagram do Jornada Viagens"><img class="instagram"
                    src="./img/icone-instagram.png" alt="Icone do instagram na cor branca"></a>
            <a href="#" target="_blank" title="Acesse o Twitter do Jornada Viagens"><img class="twitter"
                    src="./img/icone-twitter.png" alt="Icone do twitter na cor branca"></a>
        </div>
    </footer>
</body>
